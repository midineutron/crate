# crate-web nginx site config (installed at /etc/nginx/conf.d/default.conf).
#
# Serves the built SPA from /usr/share/nginx/html (baked into the image) and
# the catalog (manifest.json, audio/, artwork/) from /catalog, which is the
# read-only NFS mount supplied at runtime — NEVER baked into the image.
#
# Authentication is enforced upstream by Traefik forwardAuth -> crate-auth;
# nginx itself serves everything it can find.
#
# Static file serving in nginx supports HTTP range requests out of the box
# (Accept-Ranges: bytes), which is what the player relies on for audio seeking.

server {
    # nginx-unprivileged listens on 8080 by default; declared explicitly here.
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reasonable defaults.
    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
    gzip_min_length 1024;

    # Pod health endpoint for k8s liveness/readiness probes. Traefik routes the
    # external /health to crate-auth; this is for direct in-pod probing.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ---- App shell: must never be cached so updates land immediately ----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }
    location = /app.webmanifest {
        # Not present in the default nginx mime.types map.
        default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
    }

    # ---- SPA version check ----
    # version.js fetches /version.txt and reloads when it != APP_VERSION. This
    # MUST be the real file or a 404 — never the SPA index.html fallback, or the
    # version never matches and the app reload-loops. The image build generates
    # this file; if it is ever missing, 404 makes version.js bail out quietly.
    location = /version.txt {
        default_type text/plain;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files /version.txt =404;
    }

    # ---- Catalog from the NFS mount (read-only) ----
    # Requests map onto /catalog/<path> via the `root /catalog` directive.

    # /manifest.json -> /catalog/manifest.json (changes with the library: no-cache)
    location = /manifest.json {
        root /catalog;
        default_type application/json;
        add_header Cache-Control "no-cache" always;
    }

    # /audio/<file>.mp3 -> /catalog/audio/<file>.mp3 (range requests for seeking).
    # Content-addressed and immutable, so cache aggressively.
    location /audio/ {
        root /catalog;
        default_type audio/mpeg;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # /artwork/<file> -> /catalog/artwork/<file>
    location /artwork/ {
        root /catalog;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # ---- Everything else is the SPA; fall back to index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
