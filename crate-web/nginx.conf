# crate-web nginx site config (installed at /etc/nginx/conf.d/default.conf).
#
# Serves the audio-reactive 3D room (built SPA) from /usr/share/nginx/html and
# the catalog (manifest.json, audio/, artwork/) from /catalog, the read-only NFS
# mount supplied at runtime — NEVER baked into the image.
#
# Authentication is enforced upstream by Traefik forwardAuth -> crate-auth.
#
# nginx static serving supports HTTP range requests (Accept-Ranges: bytes) out
# of the box, which the audio player relies on for seeking.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json model/gltf-binary;
    gzip_min_length 1024;

    # Pod health endpoint for k8s probes.
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ---- App shell: never cache so updates land immediately ----
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # ---- Retire the old player PWA on returning visitors ----
    # Serve the tombstone service worker (unregisters itself + clears caches).
    # Must be no-cache so the old registration picks up the byte change.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        try_files /sw.js =404;
    }
    # Legacy endpoints the old player fetched — return clean 404s instead of the
    # SPA fallback (which would hand back index.html with the wrong content).
    location = /app.webmanifest { return 404; }
    location = /version.txt { return 404; }
    # Old bookmarks of the standalone room path -> home.
    location = /room { return 301 /; }
    location = /room/ { return 301 /; }

    # ---- Catalog from the NFS mount (read-only) ----
    location = /manifest.json {
        root /catalog;
        default_type application/json;
        add_header Cache-Control "no-cache" always;
    }
    location /audio/ {
        root /catalog;
        default_type audio/mpeg;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }
    location /artwork/ {
        root /catalog;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # ---- Everything else is the room SPA; fall back to index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
