# Non-secret crate-auth configuration.
#
# A crate node is a relying party of an EXTERNAL auth provider (mycelium, or any
# OAuth2/OIDC IdP). It does NOT assume the provider is co-located in the same
# cluster. Provider endpoints are therefore PUBLIC URLs, never in-cluster service
# DNS (no *.svc.cluster.local). See docs/adr/0004.
#
# Fill in for this deployment:
#   host          crates.mycelium-network.io  (fronted by Cloudflare Tunnel)
#   provider      mycelium's PUBLIC base URL  (set OAUTH_* below)
#   JWT_ISSUER    left blank -> iss is not checked (audience is still checked
#                 against OAUTH_CLIENT_ID). To tighten, set this to the `iss`
#                 mycelium mints (its JWT_ISSUER env; default "mycelium").
apiVersion: v1
kind: ConfigMap
metadata:
  name: crate-auth-config
  namespace: crate
data:
  # External provider endpoints for crate-auth's SERVER-SIDE OAuth calls (token
  # exchange + JWKS fetch). These use mycelium's in-cluster Service address, NOT
  # the public host: the public host api.mycelium-network.io is fronted by
  # Cloudflare with a bot/JS challenge ("Just a moment...") that returns 403 to
  # any non-browser client, so a server-to-server POST from crate-auth can never
  # complete the token exchange there. The in-cluster `backend` Service serves
  # the same OAuth API on :8080 and bypasses Cloudflare entirely (verified: same
  # JWKS signing key kid mycelium-key-1). Only works while mycelium runs in this
  # cluster; if mycelium moves out, expose an origin-direct (un-challenged)
  # hostname for it and point these there — do NOT use the CF-fronted public host.
  # (Legacy MYCELIUM_TOKEN_URL / MYCELIUM_JWKS_URL names are still accepted.)
  OAUTH_TOKEN_URL: "http://backend.mycelium.svc.cluster.local:8080/oauth/token"
  OAUTH_JWKS_URL:  "http://backend.mycelium.svc.cluster.local:8080/.well-known/jwks.json"
  REDIRECT_URI: "https://crates.mycelium-network.io/auth/callback"
  APP_ORIGIN:   "https://crates.mycelium-network.io"
  JWT_ISSUER: ""
  SESSION_TTL_DAYS: "30"
  KONAMI_SEQUENCE: "up,up,down,down,left,right,left,right,b,a"
