# Non-secret crate-auth configuration.
#
# Filled in for this deployment:
#   host          crates.mycelium-network.io  (fronted by Cloudflare Tunnel)
#   mycelium      service "backend" in namespace "mycelium", port 8080
#   JWT_ISSUER    left blank -> iss is not checked (audience is still checked
#                 against OAUTH_CLIENT_ID). To tighten, set this to the `iss`
#                 mycelium mints (its JWT_ISSUER env; default "mycelium").
apiVersion: v1
kind: ConfigMap
metadata:
  name: crate-auth-config
  namespace: crate
data:
  MYCELIUM_TOKEN_URL: "http://backend.mycelium.svc.cluster.local:8080/oauth/token"
  MYCELIUM_JWKS_URL: "http://backend.mycelium.svc.cluster.local:8080/.well-known/jwks.json"
  REDIRECT_URI: "https://crates.mycelium-network.io/auth/callback"
  APP_ORIGIN: "https://crates.mycelium-network.io"
  JWT_ISSUER: ""
  SESSION_TTL_DAYS: "30"
  KONAMI_SEQUENCE: "up,up,down,down,left,right,left,right,b,a"
