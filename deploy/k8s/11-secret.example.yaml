# EXAMPLE secret — DO NOT COMMIT REAL VALUES.
#
# Copy this file, replace the placeholders, and apply it (or use the
# `kubectl create secret` form shown in deploy/k8s/README.md). This file is
# intentionally NOT referenced by kustomization.yaml so placeholder values are
# never applied by accident.
#
#   OAUTH_CLIENT_ID / OAUTH_CLIENT_SECRET : from mycelium `POST /oauth/clients`
#   SESSION_HMAC_KEY                      : random 32+ bytes, e.g.
#                                           openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: crate-auth-secrets
  namespace: crate
type: Opaque
stringData:
  OAUTH_CLIENT_ID: "REPLACE_ME-oauth-client-id"
  OAUTH_CLIENT_SECRET: "REPLACE_ME-oauth-client-secret"
  SESSION_HMAC_KEY: "REPLACE_ME-openssl-rand-base64-32"
