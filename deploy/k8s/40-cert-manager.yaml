# cert-manager: Let's Encrypt issuer + certificate for the Crate host.
# Assumes cert-manager is already installed in the cluster.
#
# PLACEHOLDERS:
#   __ACME_EMAIL__  contact email for Let's Encrypt expiry notices
#   __HOSTNAME__    the public host (must resolve in real DNS to the cluster)
#
# Uses the HTTP-01 challenge solved through Traefik's `web` entrypoint. The
# HTTP->HTTPS redirect in 50-traefik.yaml is fine: Let's Encrypt follows the
# redirect to HTTPS when validating HTTP-01.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: __ACME_EMAIL__
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: crate-tls
  namespace: crate
spec:
  secretName: crate-tls      # consumed by the websecure IngressRoute
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - __HOSTNAME__
