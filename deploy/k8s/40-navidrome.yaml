# Navidrome: the per-node catalog runtime + audio stream backend (:4533).
#
# Subsonic-API-compatible music server. crate-web (nginx) reverse-proxies
# /rest/* -> this Service so all catalog reads AND audio streams stay
# SAME-ORIGIN with the room SPA. This is load-bearing for the Web Audio
# analyser and the iOS lock-screen Now Playing path — Navidrome must NEVER be
# reachable cross-origin, and it is intentionally ClusterIP-only (no Ingress,
# no Traefik route). See GitHub #11.
#
# Auth is injected at the gate: crate-web sets a trusted `Remote-User` header
# (Navidrome's reverse-proxy auth) so no Subsonic credential ever reaches the
# browser. Navidrome only honours that header from whitelisted source IPs
# (ND_EXTAUTH_TRUSTEDSOURCES), which — together with being ClusterIP-only —
# closes the impersonation gap.
#
# The music library is the existing read-only catalog NFS export, mounted at
# /music. Navidrome's SQLite DB + scan cache live on a SEPARATE writable PVC at
# /data — the DB is disposable/regenerable, and the music NFS stays read-only.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: navidrome-data
  namespace: crate
  labels:
    app: navidrome
    app.kubernetes.io/part-of: crate
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # k3s ships `local-path` as the default StorageClass. Change to your
  # cluster's RWO StorageClass if different. The DB is regenerable, so
  # node-local storage is acceptable.
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: navidrome
  namespace: crate
  labels:
    app: navidrome
spec:
  replicas: 1
  # Single writer against the SQLite DB on an RWO volume.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: navidrome
  template:
    metadata:
      labels:
        app: navidrome
    spec:
      # Pin to one node so the node-local DB volume (local-path) and the pod
      # always co-locate. A reschedule to another node would otherwise bind an
      # empty volume and force a full library rescan. Change the hostname to
      # match your target node's `kubernetes.io/hostname` label.
      nodeSelector:
        kubernetes.io/hostname: lenovo1
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000            # make the /data PVC writable by uid 1000
      containers:
        - name: navidrome
          image: deluan/navidrome:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4533
          env:
            - name: ND_MUSICFOLDER
              value: /music
            - name: ND_DATAFOLDER
              value: /data
            - name: ND_PORT
              value: "4533"
            - name: ND_LOGLEVEL
              value: info
            # Cron-syntax library rescan. Ingest/tagging conventions land in #14.
            - name: ND_SCANNER_SCHEDULE
              value: "@every 1h"
            # ---- Reverse-proxy auth (authenticate at the crate-web gate) ----
            # crate-web injects `Remote-User: crate`; Navidrome takes the
            # authenticated user FROM this header and IGNORES the Subsonic
            # u/p/t/s params when it is present (covers /rest/* since v0.52). A
            # proxied user that does not yet exist is auto-provisioned on a fresh
            # DB, so a DB reset needs no manual first-run step.
            #
            # TRUSTEDSOURCES must contain the IP of the DIRECT TCP peer that
            # opens the connection to Navidrome — i.e. the crate-web pod (pod
            # CIDR) — NOT the browser or ingress IP. Verified: peer IP 10.42.0.18
            # fell in the range below. (These are the current option names; the
            # legacy ND_REVERSEPROXYUSERHEADER / ND_REVERSEPROXYWHITELIST are
            # deprecated and log a warning.)
            - name: ND_EXTAUTH_USERHEADER
              value: Remote-User
            - name: ND_EXTAUTH_TRUSTEDSOURCES
              # Pod CIDR. Set to your cluster's pod network.
              value: "10.42.0.0/16"
          volumeMounts:
            - name: music
              mountPath: /music
              readOnly: true
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 4533
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 4533
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: music
          persistentVolumeClaim:
            claimName: crate-catalog-pvc
            readOnly: true
        - name: data
          persistentVolumeClaim:
            claimName: navidrome-data
---
apiVersion: v1
kind: Service
metadata:
  name: navidrome
  namespace: crate
  labels:
    app: navidrome
spec:
  # ClusterIP only — reachable solely via crate-web's /rest/* reverse proxy.
  selector:
    app: navidrome
  ports:
    - name: http
      port: 4533
      targetPort: 4533
